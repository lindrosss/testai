# Edge nginx: SPA (сервис frontend в docker-compose) + Laravel (/api, /sanctum).
# upstream по имени сервиса Docker Compose: `frontend` (не container_name).
# Проверка: docker exec vameo-nginx getent hosts frontend

server {
    listen 80;
    server_name vameo.ru www.vameo.ru localhost;

    root /var/www/html/public;
    index index.php;

    charset utf-8;

    location ^~ /api {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ^~ /sanctum/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass laravel-app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
